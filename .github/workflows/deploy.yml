name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'paper/**'
      - 'video/**'
      - 'quartz/**'
      - 'project_logs/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：连续 push 只跑最新一次，避免竞态部署和 CI 配额浪费
concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: quartz/package-lock.json
      - name: Install dependencies
        working-directory: quartz
        run: npm ci
      - name: Install plugins
        working-directory: quartz
        # 必须显式调用：.quartz/ 在 .gitignore 中，CI 全新 checkout 时
        # .quartz/plugins/index.ts 不存在，会导致 import 解析失败。
        # npx quartz build 不触发 npm prebuild 钩子（只有 npm run build 才触发）。
        run: npx quartz plugin install --from-config
      - name: Build (quartz)
        working-directory: quartz
        run: npx quartz build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: quartz/public
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
